<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>링크 생성기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f7;
      color: #1a1a2e;
      height: 100dvh;
      overflow: hidden;
    }

    .base {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    /* ── 헤더 ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0 8px;
    }
    .header-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #7c5cfc, #c471ed);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1a1a2e;
    }
    .header-sub {
      font-size: 11px;
      color: #999;
      margin-top: 1px;
    }

    /* ── 버튼 그룹 ── */
    .btnbase {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      height: 44px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      letter-spacing: -0.2px;
    }
    .btn:active { opacity: .75; transform: scale(.97); }

    .btn-primary {
      background: linear-gradient(135deg, #7c5cfc, #c471ed);
      color: #fff;
      box-shadow: 0 4px 14px #7c5cfc44;
    }
    .btn-secondary {
      background: #fff;
      color: #555;
      border: 1px solid #ddd;
    }
    .btn-auto {
      flex: 0 0 72px;
      background: #ede8ff;
      color: #7c5cfc;
      border: 1px solid #d0c4ff;
    }

    /* ── 텍스트 에리어 ── */
    .textarea-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .textarea-label {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 6px;
      padding-left: 2px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    textarea {
      flex: 1;
      width: 100%;
      background: #fff;
      border: 1px solid #e0e0ee;
      border-radius: 14px;
      color: #2a2a4a;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      padding: 14px;
      resize: none;
      line-height: 1.7;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      box-shadow: 0 2px 8px #0000000a;
    }
    textarea::placeholder { color: #bbb; }
    textarea:focus {
      border-color: #7c5cfc88;
      box-shadow: 0 0 0 3px #7c5cfc18;
    }

    /* ── 결과 화면 ── */
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-title {
      font-size: 13px;
      font-weight: 600;
      color: #999;
    }
    .btn-close {
      height: 34px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #fff;
      color: #666;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-close:active { opacity: .7; }

    .result-scroll {
      flex: 1;
      background: #fff;
      border: 1px solid #e0e0ee;
      border-radius: 14px;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 2px 8px #0000000a;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f7f5ff;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
      border: 1px solid #ede8ff;
    }
    .link-item:hover { background: #ede8ff; }
    .link-item:active { background: #e0d8ff; }
    .link-item[checked] {
      background: #f5f5f5;
      border-color: #e8e8e8;
      opacity: .5;
    }
    .link-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7c5cfc;
      flex-shrink: 0;
      transition: background .2s;
    }
    .link-item[checked] .link-dot { background: #ccc; }
    .link-text {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #5a5a8a;
      word-break: break-all;
    }
    .link-item[checked] .link-text { color: #bbb; }

    /* ── 진행 표시 ── */
    .progress-bar-wrap {
      height: 3px;
      background: #e8e8f0;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c5cfc, #c471ed);
      width: 0%;
      transition: width .3s;
      border-radius: 2px;
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

<!-- 입력 화면 -->
<div class="base" id="input">
  <div class="header">
    <div class="header-icon">🔗</div>
    <div>
      <div class="header-title">링크 생성기</div>
      <div class="header-sub">naverbooks 딥링크 도구</div>
    </div>
  </div>

  <div class="btnbase">
    <button class="btn btn-primary" id="autoopen">▶ 자동 오픈</button>
    <button class="btn btn-secondary" id="make">링크 생성</button>
    <button class="btn btn-auto" id="automake">자동 생성</button>
  </div>

  <div class="textarea-wrap">
    <div class="textarea-label">링크 목록 입력</div>
    <textarea id="links" placeholder="naverbooks://my&#10;naverbooks://event/cookie?eventNo=123"></textarea>
  </div>
</div>

<!-- 결과 화면 -->
<div class="base" id="output" hidden>
  <div class="result-header">
    <div class="result-title" id="result-count">링크 0개</div>
    <button class="btn-close" id="close">✕ 닫기</button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="result-scroll" id="result"></div>
</div>

<script>
  let isAutoMode = false;
  let totalLinks = 0;

  const show = id => {
    document.getElementById('input').hidden = (id !== 'input');
    document.getElementById('output').hidden = (id !== 'output');
  };

  const updateProgress = () => {
    if (!totalLinks) return;
    const checked = document.querySelectorAll('.link-item[checked]').length;
    document.getElementById('progress').style.width = (checked / totalLinks * 100) + '%';
    document.getElementById('result-count').textContent = `링크 ${totalLinks}개 · ${checked}개 완료`;
  };

  const addLink = (dom, href) => {
    const a = document.createElement('a');
    a.className = 'link-item';
    a.href = href;
    a.innerHTML = `<div class="link-dot"></div><div class="link-text">${href}</div>`;
    a.addEventListener('click', () => {
      a.setAttribute('checked', '');
      updateProgress();
      if (isAutoMode) setTimeout(autoClickNext, 500);
    });
    dom.appendChild(a);
  };

  const autoClickNext = () => {
    const next = document.querySelector('.link-item:not([checked])');
    if (next && isAutoMode) next.click();
  };

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && isAutoMode) setTimeout(autoClickNext, 500);
  });

  const makeLinks = () => {
    const dom = document.getElementById('result');
    dom.innerHTML = '';
    addLink(dom, 'naverbooks://my');
    for (const line of document.getElementById('links').value.split('\n')) {
      const t = line.trim();
      if (!t || !t.startsWith('naverbooks://')) continue;
      addLink(dom, t);
    }
    totalLinks = dom.querySelectorAll('.link-item').length;
    updateProgress();
    show('output');
  };

  const autoMakeLinks = () => {
    const index = parseInt(document.getElementById('links').value, 10);
    if (isNaN(index)) return alert('숫자를 입력해주세요.');
    const dom = document.getElementById('result');
    dom.innerHTML = '';
    for (let i = index; i < index + 30; i++) {
      addLink(dom, `naverbooks://event/cookie?eventNo=${i}`);
    }
    totalLinks = dom.querySelectorAll('.link-item').length;
    updateProgress();
    show('output');
  };

  document.getElementById('autoopen').addEventListener('click', () => {
    makeLinks();
    isAutoMode = true;
    setTimeout(autoClickNext, 500);
  });
  document.getElementById('make').addEventListener('click', () => {
    isAutoMode = false;
    makeLinks();
  });
  document.getElementById('automake').addEventListener('click', () => {
    isAutoMode = false;
    autoMakeLinks();
  });
  document.getElementById('close').addEventListener('click', () => {
    isAutoMode = false;
    show('input');
  });
</script>
</body>
</html>
