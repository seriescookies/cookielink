<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>링크 생성기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f7;
      color: #1a1a2e;
      height: 100dvh;
      overflow: hidden;
    }

    .base {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    /* ── 버튼 그룹 ── */
    .btnbase {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      height: 44px;
      border: none;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      letter-spacing: -0.2px;
      white-space: nowrap;
    }
    .btn:active { opacity: .75; transform: scale(.97); }

    .btn-primary {
      background: linear-gradient(135deg, #7c5cfc, #c471ed);
      color: #fff;
      box-shadow: 0 4px 14px #7c5cfc44;
    }
    .btn-secondary {
      background: #fff0f3;
      color: #d63e6e;
      border: 1px solid #f7c5d2;
    }
    .btn-pause {
      background: #fff3e0;
      color: #e67e00;
      border: 1px solid #ffd599;
    }
    .btn-collect {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }

    /* ── 진행 표시 ── */
    .progress-bar-wrap {
      height: 3px;
      background: #e8e8f0;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c5cfc, #c471ed);
      width: 0%;
      transition: width .3s;
      border-radius: 2px;
    }

    /* ── 메타 ── */
    .result-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }
    .result-title  { font-size: 11px; font-weight: 600; color: #aaa; }
    .collect-label { font-size: 11px; font-weight: 600; color: #2e7d32; }

    /* ── 콘텐츠 영역 (입력 or 리스트) ── */
    .content-area {
      flex: 1;
      background: #fff;
      border: 1px solid #e0e0ee;
      border-radius: 14px;
      box-shadow: 0 2px 8px #0000000a;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 입력 패널 */
    .input-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px;
    }
    .number-input {
      width: 160px;
      height: 36px;
      background: transparent;
      border: none;
      border-bottom: 2px solid #e0e0ee;
      border-radius: 0;
      color: #2a2a4a;
      font-size: 18px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-weight: 600;
      padding: 0 4px;
      outline: none;
      transition: border-color .2s;
      -moz-appearance: textfield;
    }
    .number-input::-webkit-inner-spin-button,
    .number-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .number-input::placeholder { color: #ccc; font-size: 13px; font-weight: 400; }
    .number-input:focus { border-color: #7c5cfc; }

    /* 리스트 패널 */
    .list-panel {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f7f5ff;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
      border: 1px solid #ede8ff;
      user-select: none;
    }
    .link-item:hover { background: #ede8ff; }
    .link-item:active { background: #e0d8ff; }
    .link-item[data-done] {
      background: #f5f5f5;
      border-color: #e8e8e8;
      opacity: .45;
    }
    .link-item[data-current] {
      background: #ede8ff;
      border-color: #7c5cfc;
      box-shadow: 0 0 0 2px #7c5cfc22;
      opacity: 1;
    }
    .link-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7c5cfc;
      flex-shrink: 0;
      transition: background .2s;
    }
    .link-item[data-done] .link-dot { background: #ccc; }
    .link-text {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      font-weight: 600;
      color: #5a5a8a;
    }
    .link-item[data-done] .link-text { color: #bbb; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

<div class="base">
  <!-- 상단 버튼 4개 -->
  <div class="btnbase">
    <button class="btn btn-secondary" id="btnGenerate">링크 생성 ●</button>
    <button class="btn btn-primary"   id="btnAutoOpen">자동 오픈 ▶</button>
    <button class="btn btn-pause"     id="btnPause">일시멈춤 ▣</button>
    <button class="btn btn-collect"   id="btnCollect">링크 추림 ★</button>
  </div>

  <!-- 진행 바 -->
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- 메타 -->
  <div class="result-meta">
    <div class="result-title"  id="resultCount"></div>
    <div class="collect-label" id="collectCount"></div>
  </div>

  <!-- 콘텐츠 영역 -->
  <div class="content-area">
    <!-- 입력 패널 -->
    <div class="input-panel" id="inputPanel">
      <input class="number-input" id="startNum" type="number" inputmode="numeric" placeholder="시작 번호">
    </div>

    <!-- 리스트 패널 -->
    <div class="list-panel" id="listPanel" hidden></div>
  </div>
</div>

<script>
  let isAutoMode = false;
  let autoIndex  = 0;
  let lastHref   = null;
  let collected  = [];

  const updateProgress = () => {
    const items = document.querySelectorAll('#listPanel .link-item');
    const done  = document.querySelectorAll('#listPanel .link-item[data-done]').length;
    const total = items.length;
    document.getElementById('progressBar').style.width = total ? (done / total * 100) + '%' : '0%';
    document.getElementById('resultCount').textContent = total ? `링크 ${total}개 · ${done}개 완료` : '';
  };

  const updateCollectCount = () => {
    document.getElementById('collectCount').textContent = collected.length ? `수집 ${collected.length}개` : '';
  };

  const markCurrent = el => {
    document.querySelectorAll('#listPanel .link-item[data-current]')
      .forEach(e => e.removeAttribute('data-current'));
    if (el) el.setAttribute('data-current', '');
  };

  const openDeeplink = (el, byAuto) => {
    lastHref = el.dataset.href;
    el.setAttribute('data-done', '');
    markCurrent(el);
    updateProgress();
    if (byAuto) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    window.location.href = el.dataset.href;
  };

  const autoClickNext = () => {
    if (!isAutoMode) return;
    const items = [...document.querySelectorAll('#listPanel .link-item')];
    for (let i = autoIndex; i < items.length; i++) {
      if (!items[i].hasAttribute('data-done')) {
        autoIndex = i + 1;
        openDeeplink(items[i], true);
        return;
      }
    }
    isAutoMode = false;
    markCurrent(null);
  };

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && isAutoMode) setTimeout(autoClickNext, 2000);
  });

  const buildList = val => {
    isAutoMode = false;
    autoIndex  = 0;
    lastHref   = null;
    collected  = [];
    updateCollectCount();

    const panel = document.getElementById('listPanel');
    panel.innerHTML = '';

    for (let i = val; i < val + 50; i++) {
      const href = `naverbooks://event/cookie?eventNo=${i}`;
      const a = document.createElement('a');
      a.className = 'link-item';
      a.dataset.href = href;
      a.innerHTML = `<div class="link-dot"></div><div class="link-text">${i}</div>`;
      a.addEventListener('click', e => { e.preventDefault(); openDeeplink(a, false); });
      panel.appendChild(a);
    }

    updateProgress();
    document.getElementById('inputPanel').hidden = true;
    document.getElementById('listPanel').hidden  = false;
    document.getElementById('btnGenerate').textContent = '리셋';
  };

  const resetToInput = () => {
    isAutoMode = false;
    document.getElementById('listPanel').hidden  = true;
    document.getElementById('inputPanel').hidden = false;
    document.getElementById('startNum').value = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('resultCount').textContent = '';
    document.getElementById('btnGenerate').textContent = '링크 생성 ●';
    document.getElementById('startNum').focus();
  };

  const doGenerate = () => {
    // 리스트가 보이는 중이면 리셋
    if (!document.getElementById('listPanel').hidden) { resetToInput(); return; }
    const val = parseInt(document.getElementById('startNum').value, 10);
    if (isNaN(val)) return;
    buildList(val);
  };

  document.getElementById('btnGenerate').addEventListener('click', doGenerate);
  document.getElementById('startNum').addEventListener('keydown', e => {
    if (e.key === 'Enter') doGenerate();
  });

  document.getElementById('btnAutoOpen').addEventListener('click', () => {
    if (document.getElementById('listPanel').hidden) return;
    isAutoMode = true;
    autoClickNext();
  });

  document.getElementById('btnPause').addEventListener('click', () => {
    isAutoMode = false;
    if (!lastHref) return;
    if (!collected.find(l => l.href === lastHref)) {
      const num = lastHref.match(/eventNo=(\d+)/)?.[1];
      if (num) { collected.push({ num, href: lastHref }); updateCollectCount(); }
    }
    navigator.clipboard.writeText(lastHref).catch(() => {});
  });

  document.getElementById('btnCollect').addEventListener('click', () => {
    if (!collected.length) { alert('수집된 링크가 없습니다.'); return; }
    const rows = collected.map(l =>
      `<a href="${l.href}"><div class="dot"></div><div class="num">${l.num}</div></a>`
    ).join('\n    ');
    const html = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>수집된 링크</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f7; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    h2 { font-size: 16px; font-weight: 700; color: #1a1a2e; }
    .list { display: flex; flex-direction: column; gap: 4px; }
    a { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px; background: #f7f5ff; border: 1px solid #ede8ff; text-decoration: none; cursor: pointer; transition: background .15s; }
    a:hover { background: #ede8ff; }
    a:active { background: #e0d8ff; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #7c5cfc; flex-shrink: 0; }
    .num { font-family: 'SF Mono','Fira Code',monospace; font-size: 14px; font-weight: 600; color: #5a5a8a; }
  </style>
</head>
<body>
  <h2>수집된 링크 · ${collected.length}개</h2>
  <div class="list">
    ${rows}
  </div>
</body>
</html>`;
    const blob = new Blob([html], { type: 'text/html' });
    window.open(URL.createObjectURL(blob), '_blank');
  });
</script>
</body>
</html>
