<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>링크 생성기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f7;
      color: #1a1a2e;
      height: 100dvh;
      overflow: hidden;
    }

    .base {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    /* ── 버튼 그룹 ── */
    .btnbase {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      height: 44px;
      border: none;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      letter-spacing: -0.2px;
      white-space: nowrap;
    }
    .btn:active { opacity: .75; transform: scale(.97); }

    .btn-manual {
      background: #fff0f3;
      color: #d63e6e;
      border: 1px solid #f7c5d2;
    }
    .btn-autogen {
      background: linear-gradient(135deg, #7c5cfc, #c471ed);
      color: #fff;
      box-shadow: 0 4px 14px #7c5cfc44;
    }
    .btn-autoopen {
      background: #e3f0ff;
      color: #1565c0;
      border: 1px solid #90caf9;
    }
    .btn-star {
      background: #fffde7;
      color: #f57f17;
      border: 1px solid #ffe082;
    }

    /* ── 진행 표시 ── */
    .progress-bar-wrap {
      height: 3px;
      background: #e8e8f0;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c5cfc, #c471ed);
      width: 0%;
      transition: width .3s;
      border-radius: 2px;
    }

    /* ── 메타 ── */
    .result-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }
    .result-title { font-size: 11px; font-weight: 600; color: #aaa; }
    .star-label {
      font-size: 11px; font-weight: 600; color: #f57f17;
      cursor: pointer; padding: 2px 6px; border-radius: 6px;
      transition: background .15s;
    }
    .star-label:hover { background: #ffe082; }
    .star-label:active { background: #ffd54f; }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: #333; color: #fff;
      font-size: 12px; font-weight: 600;
      padding: 8px 16px; border-radius: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── 콘텐츠 영역 ── */
    .content-area {
      flex: 1;
      background: #fff;
      border: 1px solid #e0e0ee;
      border-radius: 14px;
      box-shadow: 0 2px 8px #0000000a;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 입력 패널 */
    .input-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px;
    }
    .number-textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: 1px solid #e0e0ee;
      border-radius: 8px;
      color: #2a2a4a;
      font-size: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-weight: 600;
      padding: 8px 10px;
      outline: none;
      resize: none;
      line-height: 1.8;
      transition: border-color .2s;
    }
    .number-textarea::placeholder { color: #ccc; font-size: 13px; font-weight: 400; line-height: 1.6; }
    .number-textarea:focus { border-color: #7c5cfc; }

    /* 리스트 패널 */
    .list-panel {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f7f5ff;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
      border: 1px solid #ede8ff;
      user-select: none;
    }
    .link-item:hover { background: #ede8ff; }
    .link-item:active { background: #e0d8ff; }
    .link-item[data-done] {
      background: #f5f5f5;
      border-color: #e8e8e8;
      opacity: .45;
    }
    .link-item[data-star] {
      opacity: 1 !important;
      background: #fffde7 !important;
      border-color: #ffe082 !important;
    }
    .link-item[data-current] {
      background: #ede8ff;
      border-color: #7c5cfc;
      box-shadow: 0 0 0 2px #7c5cfc22;
      opacity: 1;
    }
    .link-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7c5cfc;
      flex-shrink: 0;
      transition: background .2s;
    }
    .link-item[data-done] .link-dot { background: #ccc; }
    .link-item[data-star] .link-dot { background: #f57f17; }
    .link-text {
      flex: 1;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      font-weight: 600;
      color: #5a5a8a;
    }
    .link-item[data-done] .link-text { color: #bbb; }
    .link-item[data-star] .link-text { color: #c8860a; }
    .link-star-badge {
      font-size: 13px;
      display: none;
    }
    .link-item[data-star] .link-star-badge { display: block; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

<div class="base">
  <!-- 상단 버튼 4개 -->
  <div class="btnbase">
    <button class="btn btn-manual"   id="btnManual">지정 링크</button>
    <button class="btn btn-autogen"  id="btnAutoGen">링크 자동생성</button>
    <button class="btn btn-autoopen" id="btnAutoOpen">자동활성화</button>
    <button class="btn btn-star"     id="btnStar">★표시</button>
  </div>

  <!-- 진행 바 -->
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- 메타 -->
  <div class="result-meta">
    <div class="result-title" id="resultCount"></div>
    <div class="star-label"   id="starCount"></div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- 콘텐츠 영역 -->
  <div class="content-area">
    <!-- 입력 패널 -->
    <div class="input-panel" id="inputPanel">
      <textarea class="number-textarea" id="numInput"
        placeholder="번호 또는 딥링크 입력 (한 줄에 하나씩)&#10;&#10;5자리 → event?eventNo=숫자&#10;6자리 → titleEnd?contentId=숫자&#10;694602_1 → viewer (NOVEL)&#10;naverbooks://... → 그대로 활성화"></textarea>
    </div>

    <!-- 리스트 패널 -->
    <div class="list-panel" id="listPanel" hidden></div>
  </div>
</div>

<script>
  let isAutoMode = false;
  let autoIndex  = 0;
  let lastEl     = null;

  const updateProgress = () => {
    const items = document.querySelectorAll('#listPanel .link-item');
    const done  = document.querySelectorAll('#listPanel .link-item[data-done]').length;
    const total = items.length;
    document.getElementById('progressBar').style.width = total ? (done / total * 100) + '%' : '0%';
    document.getElementById('resultCount').textContent = total ? `링크 ${total}개 · ${done}개 완료` : '';
  };

  const showToast = msg => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  };

  const updateStarCount = () => {
    const count = document.querySelectorAll('#listPanel .link-item[data-star]').length;
    document.getElementById('starCount').textContent = count ? `★ ${count}개 (탭하여 복사)` : '';
  };

  document.getElementById('starCount').addEventListener('click', () => {
    const nums = [...document.querySelectorAll('#listPanel .link-item[data-star] .link-text')]
      .map(el => el.textContent).join('\n');
    if (!nums) return;
    navigator.clipboard.writeText(nums)
      .then(() => showToast('★ 번호 복사됨'))
      .catch(() => showToast('복사 실패'));
  });

  const markCurrent = el => {
    document.querySelectorAll('#listPanel .link-item[data-current]')
      .forEach(e => e.removeAttribute('data-current'));
    if (el) el.setAttribute('data-current', '');
  };

  const openDeeplink = (el, byAuto) => {
    lastEl = el;
    el.setAttribute('data-done', '');
    markCurrent(el);
    updateProgress();
    if (byAuto) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    window.location.href = el.dataset.href;
  };

  const autoClickNext = () => {
    if (!isAutoMode) return;
    const items = [...document.querySelectorAll('#listPanel .link-item')];
    for (let i = autoIndex; i < items.length; i++) {
      if (!items[i].hasAttribute('data-done')) {
        autoIndex = i + 1;
        openDeeplink(items[i], true);
        return;
      }
    }
    isAutoMode = false;
    markCurrent(null);
  };

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && isAutoMode) setTimeout(autoClickNext, 1000);
  });

  const getInputs = () =>
    document.getElementById('numInput').value
      .split(/\n/)
      .map(s => s.trim())
      .filter(s => s.length > 0)
      .map(s => {
        if (s.startsWith('naverbooks://')) return { href: s, label: s };

        // 6자리_숫자 또는 6자리_숫자.확장자
        const volMatch = s.match(/^(\d{6})_(\d+)(?:\.\w+)?$/);
        if (volMatch) {
          const [, cid, vol] = volMatch;
          return {
            href: `naverbooks://viewer?serviceType=NOVEL&contentId=${cid}&volumeNo=${vol}`,
            label: s
          };
        }

        // 순수 숫자
        const pureMatch = s.match(/^(\d+)$/);
        if (pureMatch) {
          const n = pureMatch[1];
          if (n.length === 5) return { href: `naverbooks://event?eventNo=${n}`, label: n };
          if (n.length === 6) return { href: `naverbooks://titleEnd?contentId=${n}`, label: n };
          return null; // 그 외 자릿수 무시
        }

        return null;
      })
      .filter(Boolean);

  const getNumbers = () =>
    getInputs()
      .filter(item => /^\d+$/.test(item.label))
      .map(item => parseInt(item.label, 10));

  const createItem = ({ href, label }) => {
    const a = document.createElement('a');
    a.className = 'link-item';
    a.dataset.href = href;
    a.innerHTML = `<div class="link-dot"></div><div class="link-text">${label}</div><div class="link-star-badge">★</div>`;
    a.addEventListener('click', e => { e.preventDefault(); openDeeplink(a, false); });
    return a;
  };

  const buildList = items => {
    isAutoMode = false;
    autoIndex  = 0;
    lastEl     = null;

    const panel = document.getElementById('listPanel');
    panel.innerHTML = '';
    items.forEach(item => panel.appendChild(createItem(item)));

    updateProgress();
    updateStarCount();
    document.getElementById('inputPanel').hidden = true;
    document.getElementById('listPanel').hidden  = false;
  };

  const resetToInput = () => {
    isAutoMode = false;
    lastEl = null;
    document.getElementById('listPanel').hidden  = true;
    document.getElementById('inputPanel').hidden = false;
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('resultCount').textContent = '';
    document.getElementById('starCount').textContent   = '';
    document.getElementById('numInput').focus();
  };

  const isListVisible = () => !document.getElementById('listPanel').hidden;

  // 지정 링크: 입력된 번호들 각각 링크 생성
  document.getElementById('btnManual').addEventListener('click', () => {
    if (isListVisible()) { resetToInput(); return; }
    const items = getInputs();
    if (!items.length) return;
    buildList(items);
  });

  // 링크 자동생성: 첫 번째 숫자부터 50개 순차 생성
  document.getElementById('btnAutoGen').addEventListener('click', () => {
    if (isListVisible()) { resetToInput(); return; }
    const nums = getNumbers();
    if (!nums.length) return;
    buildList(Array.from({ length: 50 }, (_, i) => {
      const n = nums[0] + i;
      return { href: `naverbooks://event?eventNo=${n}`, label: String(n) };
    }));
  });

  // 자동활성화
  document.getElementById('btnAutoOpen').addEventListener('click', () => {
    if (!isListVisible()) return;
    isAutoMode = true;
    autoClickNext();
  });

  // ★표시: 마지막 활성화된 링크에 별표 토글
  document.getElementById('btnStar').addEventListener('click', () => {
    if (!lastEl) return;
    if (lastEl.hasAttribute('data-star')) {
      lastEl.removeAttribute('data-star');
    } else {
      lastEl.setAttribute('data-star', '');
    }
    updateStarCount();
  });
</script>
</body>
</html>
